##name of the workflow
name: CI/CD Pipeline

# what events trigger the workflow
on:
    push:
        branches:
            - main
            - 'feature/*'  # Trigger on pushes to feature branches as well
    pull_request:
        branches:
            - main

    ## for manual trigger of the workflow for debugging or speacial cases
    workflow_dispatch:

# jobs to run in the workflow
jobs:
    build-and-push-image:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Get changed files
              id: changed-files-build
              uses: tj-actions/changed-files@v45
              with:
                files: |
                    Dockerfile
                    requirements.txt
            - name: Set up Docker Buildx
              if: steps.changed-files-build.outputs.any_changed == 'true'
              uses: docker/setup-buildx-action@v3
            - name: Log in to Docker Hub
              if: steps.changed-files-build.outputs.any_changed == 'true'
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}
            - name: Build and push Docker image
              if: steps.changed-files-build.outputs.any_changed == 'true'
              run: |
                docker buildx build --push \
                    --tag ${{ vars.DOCKERHUB_NAMESPACE}}/${{ vars.DOCKERHUB_REPOSITORY }}:latest \
                    --tag ${{ vars.DOCKERHUB_NAMESPACE}}/${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }} \
                    .
